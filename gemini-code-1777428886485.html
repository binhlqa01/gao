<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chào mừng Bé Yêu!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="welcome-screen">
        <div class="baby-info">
            <h1>Hello, World! I'm Coming Soon...</h1>
            <p>Gia đình mình đang đợi em bé: <strong>[Tên biệt danh của bé]</strong></p>
            
            <!-- Đồng hồ đếm ngược -->
            <div id="countdown">
                <div class="time-box"><span id="days">00</span><p>Ngày</p></div>
                <div class="time-box"><span id="hours">00</span><p>Giờ</p></div>
                <div class="time-box"><span id="minutes">00</span><p>Phút</p></div>
            </div>
        </div>
    </section>

    <section class="gallery">
        <h2>Hành trình của Ba Mẹ & Bé</h2>
        <div class="photo-grid">
            <img src="anh-sieu-am.jpg" alt="Ảnh siêu âm">
            <img src="anh-bau.jpg" alt="Ảnh mẹ bầu">
        </div>
    </section>
</body>
</html>
